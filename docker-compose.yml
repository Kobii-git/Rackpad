services:
  rackpad:
    image: ghcr.io/${GITHUB_REPO_OWNER:-Kobii-git}/rackpad:${RACKPAD_TAG:-v0.3.0}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rackpad
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /data/rackpad.db
      MONITOR_INTERVAL_MS: ${MONITOR_INTERVAL_MS:-300000}
    ports:
      - "${RACKPAD_PORT:-3000}:3000"
    volumes:
      - rackpad_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  rackpad_data:
