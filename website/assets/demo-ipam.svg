    Subnets, scopes, zones, and one monitoring workspace
  </text>
  <text
    x="106"
    y="204"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="18"
    fill="#b9c3d1"
  >
    Track where addresses live and whether the services that use them are
    actually reachable.
  </text>

