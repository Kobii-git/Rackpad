<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Rackpad demo IPAM and monitoring view</title>
  <desc id="desc">
    A dark Rackpad preview combining VLAN-aware IPAM, subnets, DHCP scopes, and
    the monitoring workspace.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#091018" />
      <stop offset="100%" stop-color="#111c28" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect
    x="56"
    y="44"
    width="1488"
    height="812"
    rx="30"
    fill="#101823"
    stroke="rgba(255,255,255,0.08)"
  />
  <text
    x="106"
    y="112"
    font-family="Consolas, monospace"
    font-size="16"
    letter-spacing="4"
    fill="#8f9bab"
  >
    IPAM / MONITORING
  </text>
  <text
    x="106"
    y="164"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#ecf2f8"
