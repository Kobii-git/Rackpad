<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Rackpad demo compute view</title>
  <desc id="desc">
    A dark Rackpad compute preview showing host capacity, guest mappings, and
    virtual switch memberships.
  </desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1017" />
      <stop offset="100%" stop-color="#111b27" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <rect
    x="54"
    y="42"
    width="1492"
    height="816"
    rx="30"
    fill="#101823"
    stroke="rgba(255,255,255,0.08)"
  />
  <text
    x="104"
    y="112"
    font-family="Consolas, monospace"
    font-size="16"
    letter-spacing="4"
    fill="#8f9bab"
  >
    COMPUTE
  </text>
  <text
    x="104"
    y="164"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#ecf2f8"
  >
    Compute hosts, guests, bridges, and documented capacity
  </text>
  <text
    x="104"
    y="204"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="18"
    fill="#b9c3d1"
  >
    Track how guest VMs land on hosts and how their NICs join shared external,
    internal, or private virtual switching fabrics.
  </text>

  <g transform="translate(104 248)">
    <g>
      <rect
        width="328"
        height="106"
        rx="20"
        fill="#141d2a"
        stroke="rgba(255,255,255,0.08)"
      />
      <text
        x="26"
        y="34"
        font-family="Consolas, monospace"
        font-size="14"
        letter-spacing="2"
        fill="#8f9bab"
      >
        HOSTS
      </text>
      <text
        x="26"
        y="84"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="40"
        font-weight="700"
        fill="#ecf2f8"
      >
        4
      </text>
    </g>
    <g transform="translate(354 0)">
      <rect
        width="328"
        height="106"
        rx="20"
        fill="#141d2a"
        stroke="rgba(255,255,255,0.08)"
      />
      <text
        x="26"
        y="34"
        font-family="Consolas, monospace"
        font-size="14"
        letter-spacing="2"
        fill="#8f9bab"
      >
        ACTIVE HOSTS
      </text>
      <text
        x="26"
        y="84"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="40"
        font-weight="700"
        fill="#ecf2f8"
      >
        2
      </text>
    </g>
    <g transform="translate(708 0)">
      <rect
        width="328"
        height="106"
        rx="20"
        fill="#141d2a"
        stroke="rgba(255,255,255,0.08)"
      />
      <text
        x="26"
        y="34"
        font-family="Consolas, monospace"
        font-size="14"
        letter-spacing="2"
        fill="#8f9bab"
      >
        VMS
      </text>
      <text
        x="26"
        y="84"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="40"
        font-weight="700"
        fill="#ecf2f8"
      >
        9
      </text>
    </g>
    <g transform="translate(1062 0)">
      <rect
        width="328"
        height="106"
        rx="20"
        fill="#141d2a"
        stroke="rgba(255,255,255,0.08)"
      />
      <text
        x="26"
        y="34"
        font-family="Consolas, monospace"
        font-size="14"
        letter-spacing="2"
        fill="#8f9bab"
      >
        UNASSIGNED VMS
      </text>
      <text
        x="26"
        y="84"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="40"
        font-weight="700"
        fill="#ecf2f8"
      >
        0
      </text>
    </g>
  </g>

  <rect
    x="104"
    y="386"
    width="912"
    height="388"
    rx="24"
    fill="#141d2a"
    stroke="rgba(255,255,255,0.08)"
